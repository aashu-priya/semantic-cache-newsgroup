<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Semantic Cache — 20 Newsgroups</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #060810;
    --surface:   #0e1520;
    --surface2:  #162030;
    --border:    #243448;
    --accent:    #00d4ff;
    --accent2:   #ff7a45;
    --hit:       #00e676;
    --miss:      #ff5252;
    --text:      #f0f8ff;
    --text2:     #c8dff0;
    --muted:     #6a88a8;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated grid background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Glow orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.07;
    animation: drift 20s ease-in-out infinite alternate;
  }
  .orb-1 { width:600px; height:600px; background:#00d4ff; top:-200px; left:-200px; animation-delay:0s; }
  .orb-2 { width:500px; height:500px; background:#ff6b35; bottom:-200px; right:-100px; animation-delay:-7s; }
  .orb-3 { width:400px; height:400px; background:#7b2fff; top:50%; left:50%; animation-delay:-14s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px,30px) scale(1.1); }
  }

  /* ── Layout ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px 100px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 64px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--border);
    animation: fadeDown 0.6s ease both;
  }
  .logo-block { display:flex; flex-direction:column; gap:10px; }
  .logo {
    font-family: var(--font-head);
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, #e0f7ff 55%, #ffffff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo span {
    background: linear-gradient(135deg, var(--accent2), #ffcc44);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-start;
    padding-top: 8px;
    animation: fadeDown 0.6s ease 0.1s both;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 18px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    transition: border-color 0.3s;
  }
  .stat-pill:hover { border-color: var(--accent); }
  .stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .stat-dot.live { background: var(--hit); box-shadow: 0 0 8px var(--hit); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .stat-val { color: var(--accent); font-weight: 600; }

  /* ── Search area ── */
  .search-section {
    margin-bottom: 48px;
    animation: fadeUp 0.7s ease 0.2s both;
  }
  .search-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: block;
  }
  .search-box {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 24px;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1), 0 0 24px rgba(0,212,255,0.08);
  }
  .search-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 18px 36px;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  .search-btn:hover { background:#33ddff; transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,212,255,0.35); }
  .search-btn:active { transform:translateY(0); }
  .search-btn:disabled { background:var(--muted); cursor:not-allowed; transform:none; box-shadow:none; }
  .search-btn .btn-spinner {
    display: none;
    width:16px; height:16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius:50%;
    animation: spin 0.7s linear infinite;
  }
  .search-btn.loading .btn-text { display:none; }
  .search-btn.loading .btn-spinner { display:block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Example queries ── */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    align-items: center;
  }
  .example-chip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.05); }

  /* ── Result card ── */
  .result-section { animation: fadeUp 0.5s ease both; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .cache-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.4s;
  }
  .cache-badge.hit {
    background: rgba(0,230,118,0.12);
    border: 1px solid rgba(0,230,118,0.4);
    color: var(--hit);
  }
  .cache-badge.miss {
    background: rgba(255,82,82,0.1);
    border: 1px solid rgba(255,82,82,0.3);
    color: var(--miss);
  }
  .cache-badge svg { width:14px; height:14px; }

  .meta-tags { display:flex; gap:10px; flex-wrap:wrap; }
  .meta-tag {
    font-size: 12px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .meta-tag strong { color: var(--text); font-weight: 600; }

  /* ── Match info ── */
  .match-info {
    background: var(--surface);
    border: 1px solid rgba(0,212,255,0.25);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .match-info .match-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .match-info .match-val { font-size:14px; color:var(--text); font-weight:500; }

  .sim-bar-wrap { display:flex; align-items:center; gap:12px; }
  .sim-bar {
    width: 140px; height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .sim-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), #ffffff);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .sim-num { font-size:13px; color:var(--accent); font-weight:500; min-width:40px; }

  /* ── Results list ── */
  .results-list { display:flex; flex-direction:column; gap:12px; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    transition: all 0.25s;
    animation: fadeUp 0.4s ease both;
    cursor: default;
  }
  .result-item:hover {
    border-color: rgba(0,212,255,0.3);
    transform: translateX(4px);
    box-shadow: -3px 0 0 var(--accent), 0 4px 24px rgba(0,0,0,0.4);
  }
  .result-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .category-tag {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(255,122,69,0.12);
    border: 1px solid rgba(255,122,69,0.3);
    border-radius: 5px;
    padding: 4px 12px;
  }
  .sim-score {
    font-size: 12px;
    color: var(--text2);
  }
  .sim-score strong { color: var(--accent); font-weight:600; }

  .result-snippet {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text2);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  /* ── Cluster panel ── */
  .cluster-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    margin-top: 28px;
  }
  .cluster-panel-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .cluster-name {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .cluster-id { font-size:12px; color:var(--muted); letter-spacing:1px; }

  /* ── Cache entries sidebar ── */
  .bottom-section {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
    margin-top: 36px;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  @media (max-width: 768px) { .bottom-section { grid-template-columns:1fr; } }

  .entries-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .entries-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .entries-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text2);
    font-weight: 500;
  }
  .clear-btn {
    background: transparent;
    border: 1px solid rgba(255,82,82,0.4);
    color: var(--miss);
    border-radius: 5px;
    padding: 5px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { background: rgba(255,82,82,0.12); }

  .entries-list {
    max-height: 340px;
    overflow-y: auto;
    padding: 6px 0;
  }
  .entries-list::-webkit-scrollbar { width:4px; }
  .entries-list::-webkit-scrollbar-track { background:transparent; }
  .entries-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .entry-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(36,52,72,0.6);
    transition: background 0.2s;
    animation: fadeIn 0.3s ease both;
  }
  .entry-row:hover { background: var(--surface2); }
  .entry-dot {
    width:7px; height:7px; border-radius:50%;
    background: var(--accent); flex-shrink:0;
    box-shadow: 0 0 7px var(--accent);
  }
  .entry-text {
    font-size: 12px;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .entry-hits {
    font-size: 11px;
    color: var(--accent2);
    flex-shrink: 0;
    font-weight: 500;
  }
  .empty-entries {
    padding: 40px 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── Stats panel ── */
  .stats-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
  }
  .stat-card-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .stat-card-val {
    font-family: var(--font-head);
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), #e0f7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-card-val.orange {
    background: linear-gradient(135deg, var(--accent2), #ffcc44);
    -webkit-background-clip: text;
    background-clip: text;
  }
  .stat-row { display:flex; gap:14px; }
  .stat-row .stat-card { flex:1; }

  /* ── Hit rate ring ── */
  .hit-rate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .ring-wrap { position:relative; width:76px; height:76px; flex-shrink:0; }
  .ring-svg { transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--border); stroke-width:6; }
  .ring-fill {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 198;
    stroke-dashoffset: 198;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
  }
  .ring-text {
    position: absolute;
    inset:0; display:flex;
    align-items:center; justify-content:center;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .ring-info {}
  .ring-info .stat-card-label { margin-bottom:8px; }
  .ring-detail { font-size:12px; color:var(--text2); line-height:2; }
  .ring-detail strong { color: var(--text); font-weight:600; }

  /* ── Error state ── */
  .error-card {
    background: rgba(255,82,82,0.08);
    border: 1px solid rgba(255,82,82,0.25);
    border-radius: 10px;
    padding: 20px 24px;
    color: var(--miss);
    font-size: 13px;
    display: none;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 14px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── Animations ── */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:none} }
  @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-block">
      <div class="logo">Semantic<span>Cache</span></div>
      <div class="tagline">20 Newsgroups · Cluster-Aware Retrieval · MiniLM-L6</div>
    </div>
    <div class="stats-bar" id="statsBar">
      <div class="stat-pill">
        <div class="stat-dot live"></div>
        <span>API <span class="stat-val" id="statusVal">LIVE</span></span>
      </div>
      <div class="stat-pill">
        <span>Docs <span class="stat-val" id="docsVal">—</span></span>
      </div>
      <div class="stat-pill">
        <span>τ = <span class="stat-val" id="tauVal">—</span></span>
      </div>
      <div class="stat-pill">
        <span>K = <span class="stat-val" id="kVal">—</span></span>
      </div>
    </div>
  </header>

  <!-- Search -->
  <div class="search-section">
    <span class="search-label">// Enter a natural language query</span>
    <div class="search-box">
      <input
        class="search-input"
        id="queryInput"
        type="text"
        placeholder="e.g. NASA space shuttle launch into orbit"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="searchBtn" onclick="submitQuery()">
        <span class="btn-text">Search</span>
        <div class="btn-spinner"></div>
      </button>
    </div>
    <div class="examples">
      <span style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);align-self:center;">Try:</span>
      <button class="example-chip" onclick="setQuery(this)">NASA space shuttle launch</button>
      <button class="example-chip" onclick="setQuery(this)">Windows 95 driver crash BSOD</button>
      <button class="example-chip" onclick="setQuery(this)">gun control second amendment</button>
      <button class="example-chip" onclick="setQuery(this)">Apple Mac processor upgrade</button>
      <button class="example-chip" onclick="setQuery(this)">cryptography public key encryption</button>
      <button class="example-chip" onclick="setQuery(this)">space shuttle mission by NASA</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Result -->
  <div id="resultSection" style="display:none">

    <div class="result-header">
      <div class="cache-badge" id="cacheBadge">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="7"/></svg>
        <span id="badgeText">—</span>
      </div>
      <div class="meta-tags" id="metaTags"></div>
    </div>

    <div class="match-info" id="matchInfo" style="display:none">
      <div>
        <div class="match-label">Matched cached query</div>
        <div class="match-val" id="matchedQuery">—</div>
      </div>
      <div class="sim-bar-wrap">
        <div class="sim-bar"><div class="sim-bar-fill" id="simBarFill" style="width:0%"></div></div>
        <div class="sim-num" id="simNum">—</div>
      </div>
    </div>

    <div class="results-list" id="resultsList"></div>

    <div class="cluster-panel" id="clusterPanel">
      <div class="cluster-panel-title">// Dominant semantic cluster</div>
      <div class="cluster-name" id="clusterName">—</div>
      <div class="cluster-id" id="clusterId">—</div>
    </div>

  </div>

  <!-- Bottom section -->
  <div class="bottom-section">

    <!-- Cache entries -->
    <div class="entries-panel">
      <div class="entries-header">
        <span class="entries-title">// Cache entries</span>
        <button class="clear-btn" onclick="clearCache()">Flush Cache</button>
      </div>
      <div class="entries-list" id="entriesList">
        <div class="empty-entries">No cached queries yet</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-panel">
      <div class="hit-rate-card">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 72 72" width="72" height="72">
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#ffffff"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="36" cy="36" r="30"/>
            <circle class="ring-fill" id="ringFill" cx="36" cy="36" r="30"/>
          </svg>
          <div class="ring-text" id="ringPct">0%</div>
        </div>
        <div class="ring-info">
          <div class="stat-card-label">Hit Rate</div>
          <div class="ring-detail">
            <strong id="statHits">0</strong> hits<br/>
            <strong id="statMisses">0</strong> misses<br/>
            <strong id="statTotal">0</strong> total lookups
          </div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-card-label">Entries</div>
          <div class="stat-card-val" id="statEntries">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Latency</div>
          <div class="stat-card-val orange" id="statLatency">—</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:8000';

// ── Bootstrap ─────────────────────────────────────────────────────────────
async function init() {
  try {
    const h = await fetch(`${API}/health`).then(r=>r.json());
    document.getElementById('docsVal').textContent  = h.collection.toLocaleString();
    document.getElementById('tauVal').textContent   = h.tau;
    document.getElementById('kVal').textContent     = h.K;
    document.getElementById('statusVal').textContent = 'LIVE';
  } catch(e) {
    document.getElementById('statusVal').textContent = 'OFFLINE';
    document.getElementById('statusVal').style.color = 'var(--miss)';
  }
  refreshStats();
  refreshEntries();
}

// ── Submit query ───────────────────────────────────────────────────────────
async function submitQuery() {
  const input = document.getElementById('queryInput');
  const query = input.value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('errorCard').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';

  const t0 = performance.now();

  try {
    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query})
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Request failed');
    }

    const data  = await res.json();
    const ms    = (performance.now() - t0).toFixed(0);
    renderResult(data, ms);
    refreshStats();
    refreshEntries();

  } catch(e) {
    const errCard = document.getElementById('errorCard');
    errCard.textContent = `Error: ${e.message}`;
    errCard.style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── Render result ──────────────────────────────────────────────────────────
function renderResult(data, ms) {
  const section = document.getElementById('resultSection');
  section.style.display = 'block';

  // Badge
  const badge = document.getElementById('cacheBadge');
  const badgeText = document.getElementById('badgeText');
  badge.className = 'cache-badge ' + (data.cache_hit ? 'hit' : 'miss');
  badgeText.textContent = data.cache_hit ? 'Cache Hit' : 'Cache Miss';

  // Meta tags
  const meta = document.getElementById('metaTags');
  meta.innerHTML = `
    <div class="meta-tag">Cluster <strong>${data.dominant_cluster_name}</strong></div>
    <div class="meta-tag">Latency <strong>${ms}ms</strong></div>
    ${data.result.compute_time ? `<div class="meta-tag">Compute <strong>${(data.result.compute_time*1000).toFixed(0)}ms</strong></div>` : ''}
    <div class="meta-tag">Results <strong>${data.result.n_results}</strong></div>
  `;

  // Match info (only on hit)
  const matchInfo = document.getElementById('matchInfo');
  if (data.cache_hit && data.matched_query) {
    matchInfo.style.display = 'flex';
    document.getElementById('matchedQuery').textContent = data.matched_query;
    const pct = Math.round((data.similarity_score||0) * 100);
    document.getElementById('simBarFill').style.width = pct + '%';
    document.getElementById('simNum').textContent = (data.similarity_score||0).toFixed(4);
  } else {
    matchInfo.style.display = 'none';
  }

  // Results
  const list = document.getElementById('resultsList');
  list.innerHTML = '';
  (data.result.results || []).forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.style.animationDelay = (i * 60) + 'ms';
    item.innerHTML = `
      <div class="result-item-header">
        <span class="category-tag">${r.category}</span>
        <span class="sim-score">similarity <strong>${r.similarity}</strong></span>
      </div>
      <div class="result-snippet">${escHtml(r.snippet)}</div>
    `;
    list.appendChild(item);
  });

  // Cluster panel
  document.getElementById('clusterName').textContent = data.dominant_cluster_name;
  document.getElementById('clusterId').textContent   = `cluster index ${data.dominant_cluster}`;

  // Scroll to result
  section.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── Refresh stats ──────────────────────────────────────────────────────────
async function refreshStats() {
  try {
    const s = await fetch(`${API}/cache/stats`).then(r=>r.json());
    const pct = Math.round((s.hit_rate||0) * 100);

    document.getElementById('ringPct').textContent  = pct + '%';
    document.getElementById('statHits').textContent    = s.hit_count;
    document.getElementById('statMisses').textContent  = s.miss_count;
    document.getElementById('statTotal').textContent   = s.hit_count + s.miss_count;
    document.getElementById('statEntries').textContent = s.total_entries;

    // Animate ring
    const circumference = 2 * Math.PI * 30; // 188.5
    const offset = circumference * (1 - (s.hit_rate||0));
    document.getElementById('ringFill').style.strokeDasharray  = circumference;
    document.getElementById('ringFill').style.strokeDashoffset = offset;
  } catch(e) {}
}

// ── Refresh cache entries ──────────────────────────────────────────────────
async function refreshEntries() {
  try {
    const data = await fetch(`${API}/cache/entries`).then(r=>r.json());
    const list = document.getElementById('entriesList');
    list.innerHTML = '';

    if (!data.entries || data.entries.length === 0) {
      list.innerHTML = '<div class="empty-entries">No cached queries yet</div>';
      return;
    }

    data.entries.forEach(e => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      row.innerHTML = `
        <div class="entry-dot"></div>
        <div class="entry-text" title="${escHtml(e.query)}">${escHtml(e.query)}</div>
        <div class="entry-hits">${e.hit_count}×</div>
      `;
      row.title = `Cluster: ${e.cluster_name}`;
      list.appendChild(row);
    });
  } catch(e) {}
}

// ── Clear cache ────────────────────────────────────────────────────────────
async function clearCache() {
  try {
    await fetch(`${API}/cache`, {method:'DELETE'});
    document.getElementById('entriesList').innerHTML =
      '<div class="empty-entries">Cache cleared</div>';
    refreshStats();
    document.getElementById('statLatency').textContent = '—';
  } catch(e) {}
}

// ── Example chips ──────────────────────────────────────────────────────────
function setQuery(el) {
  document.getElementById('queryInput').value = el.textContent;
  document.getElementById('queryInput').focus();
}

// ── Enter key ─────────────────────────────────────────────────────────────
document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitQuery();
});

// ── Util ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────
init();
setInterval(refreshStats, 10000);
</script>
</body>
</html>
